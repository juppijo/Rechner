<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WRZT - Pro-Calculator</title>
    <style>
        :root { --neon: #00ffcc; --bg: #121212; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; transition: 0.3s; }
        .calc-container { width: 450px; border: 1px solid #333; padding: 20px; border-radius: 15px; background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #display { width: 100%; height: 60px; background: #000; color: #0f0; border: 1px solid #444; text-align: right; font-size: 1.5em; margin-bottom: 15px; padding: 10px; box-sizing: border-box; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        button { padding: 12px; cursor: pointer; background: #2a2a2a; color: white; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #3a3a3a; transform: translateY(-1px); }
        .op-btn { background: #444; color: var(--neon); }
        .const-btn { background: #004d40; color: #80cbc4; }
        .trig-btn { background: #311b92; color: #b39ddb; }
        .fs-btn { grid-column: span 5; background: #b71c1c; margin-top: 10px; }
        textarea { width: 100%; height: 60px; margin-top: 15px; background: #000; color: #888; border: 1px solid #333; border-radius: 5px; padding: 5px; font-family: monospace; }
    </style>
</head>
<body id="main">

<div class="calc-container" id="calc">
    <h2 style="text-align:center; margin-top:0; font-weight: 300;">WRZT Scientific</h2>
    <input type="text" id="display" placeholder="0">
    
    <div class="grid">
        <button class="trig-btn" onclick="mathOp('sin')">sin</button>
        <button class="trig-btn" onclick="mathOp('cos')">cos</button>
        <button class="trig-btn" onclick="mathOp('tan')">tan</button>
        <button class="op-btn" onclick="append('**')">xʸ</button>
        <button class="op-btn" onclick="clearDisplay()" style="color:#ff5555">AC</button>

        <button onclick="append('7')">7</button><button onclick="append('8')">8</button><button onclick="append('9')">9</button>
        <button class="op-btn" onclick="append('/')">/</button>
        <button class="const-btn" onclick="insertConst('Xi')">Ξ</button>

        <button onclick="append('4')">4</button><button onclick="append('5')">5</button><button onclick="append('6')">6</button>
        <button class="op-btn" onclick="append('*')">*</button>
        <button class="const-btn" onclick="insertConst('eta')">η</button>

        <button onclick="append('1')">1</button><button onclick="append('2')">2</button><button onclick="append('3')">3</button>
        <button class="op-btn" onclick="append('-')">-</button>
        <button class="const-btn" onclick="insertConst('Rmin')">Rₘ</button>

        <button onclick="append('0')">0</button><button onclick="append('.')">.</button>
        <button class="op-btn" onclick="calculate()" style="background: var(--neon); color: black;">=</button>
        <button class="op-btn" onclick="append('+')">+</button>
        <button class="const-btn" onclick="insertConst('c')">c</button>

        <button class="fs-btn" onclick="toggleFullScreen()">Vollbild Modus</button>
    </div>

    <textarea id="console" placeholder="Script-Konsole (z.B. Math.PI * 2)"></textarea>
</div>

<script>
    const WRZT = {
        Xi: 5.8993e-19,
        eta: 4.5543e-31,
        Rmin: 7.716e-13,
        c: 299792458
    };

    const display = document.getElementById('display');

    function append(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function insertConst(name) { display.value += WRZT[name]; }

    function mathOp(type) {
        let val = parseFloat(display.value);
        if (isNaN(val)) return;
        // Rechnet von Grad in Radiant um, falls gewünscht: Math.PI / 180 * val
        if (type === 'sin') display.value = Math.sin(val);
        if (type === 'cos') display.value = Math.cos(val);
        if (type === 'tan') display.value = Math.tan(val);
    }

    function calculate() {
        try {
            // eval ist für einfache Rechner okay, ersetzt Konstanten falls im String
            let result = eval(display.value.replace('π', Math.PI));
            display.value = result;
        } catch (e) { display.value = "Error"; }
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            document.body.style.justifyContent = "center";
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }
</script>

</body>
</html>
