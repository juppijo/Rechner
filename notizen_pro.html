<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
  Meine Notizen
</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&family=Courier+Prime&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --sidebar: #252525;
  --ink: #1a1a1a;
  --border: rgba(0,0,0,0.1);
  --shadow: 0 4px 24px rgba(0,0,0,0.12);
  --accent: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Lora', Georgia, serif;
  background: #f5f0e8;
  color: var(--ink);
  height: 100vh;
  display: flex;
  overflow: hidden;
  transition: background 0.5s ease;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 252px; min-width: 252px;
  background: var(--sidebar);
  display: flex; flex-direction: column;
  z-index: 10; overflow: hidden;
}
#sidebar-header { padding: 24px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
#sidebar-header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #f0ece0; letter-spacing:.02em; }
#sidebar-header p  { font-size:.7rem; color:#888; margin-top:3px; font-style:italic; }
#new-note-btn {
  margin:14px 14px 8px; padding:10px 14px;
  background:var(--accent); color:#fff; border:none; border-radius:6px;
  font-family:'Lora',serif; font-size:.85rem; cursor:pointer;
  display:flex; align-items:center; gap:7px; transition:background .2s,transform .1s;
}
#new-note-btn:hover { background:#a93226; transform:translateY(-1px); }
#notes-list { flex:1; overflow-y:auto; padding:6px 8px; }
#notes-list::-webkit-scrollbar { width:4px; }
#notes-list::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }
.note-item {
  padding:10px 12px; border-radius:7px; margin-bottom:3px;
  cursor:pointer; border-left:3px solid transparent;
  transition:background .15s,border-color .15s; position:relative;
}
.note-item:hover { background:rgba(255,255,255,.06); }
.note-item.active { background:rgba(255,255,255,.1); border-left-color:var(--accent); }
.note-item-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle; }
.note-item-title { font-size:.83rem;color:#d4cfc4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;display:inline;vertical-align:middle; }
.note-item-date  { font-size:.67rem;color:#666;margin-top:2px;padding-left:15px; }
.note-item-del { position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;font-size:.9rem;opacity:0;transition:opacity .15s;padding:4px; }
.note-item:hover .note-item-del { opacity:1; }
.note-item-del:hover { color:#e74c3c; }
.empty-state { text-align:center;color:#555;font-size:.78rem;padding:28px 10px;font-style:italic; }

/* ── BG SECTION ── */
#bg-section { padding:12px 14px; border-top:1px solid rgba(255,255,255,0.07); flex-shrink:0; }
#bg-section label { font-size:.65rem;color:#777;text-transform:uppercase;letter-spacing:.09em;display:block;margin-bottom:8px; }
#bg-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
.bg-sw {
  width:100%;aspect-ratio:1;border-radius:5px;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;
  position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15);
}
.bg-sw:hover { transform:scale(1.12); }
.bg-sw.sel { border-color:#fff; }
.bg-sw.sel::after { content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:#fff;font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,.6); }
.bg-sw.pick { background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);display:flex;align-items:center;justify-content:center;font-size:11px; }
#custom-bg { display:none; }

/* ── MAIN ── */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* TOP TOOLBAR */
#toolbar {
  display: flex;
  align-items: center; 
  gap: 8px;
  padding: 10px 18px;
  background: rgba(245,240,232,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  /* flex-wrap: wrap; <-- Entferne dies, falls die Leiste starr bleiben soll */
  transition: background .4s;
  z-index: 500; /* Toolbar über dem Papier-Scrollbereich */
}
#note-title-input {
  flex:1; min-width:130px;
  font-family:'Playfair Display',serif; font-size:1rem;
  border:none; background:transparent; outline:none; color:var(--ink);
  border-bottom:2px solid transparent; padding:3px 2px;
  transition:border-color .2s;
}
#note-title-input:focus { border-bottom-color:var(--accent); }
#note-title-input::placeholder { color:#bbb; }
.tsep { width:1px;height:22px;background:var(--border);flex-shrink:0; }
#color-palette { display:flex;gap:6px;align-items:center; }
.csw {
  width:19px;height:19px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:transform .15s,border-color .15s;position:relative;
}
.csw:hover { transform:scale(1.2); }
.csw.sel { border-color:#333;transform:scale(1.15); }
.csw.sel::after { content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:rgba(0,0,0,.5);font-weight:bold; }
.tbtn {
  padding:5px 11px; border:1px solid var(--border); border-radius:6px;
  background:white; font-family:'Lora',serif; font-size:.75rem;
  cursor:pointer; color:var(--ink); display:flex; align-items:center; gap:4px;
  transition:background .15s,transform .1s,box-shadow .15s; white-space:nowrap; flex-shrink:0;
}
.tbtn:hover { background:#f0ece0; box-shadow:0 2px 8px rgba(0,0,0,.08); transform:translateY(-1px); }
.tbtn:active { transform:translateY(0); }
.tbtn.red   { background:var(--accent);color:#fff;border-color:transparent; }
.tbtn.red:hover { background:#a93226; }
.tbtn.grn   { background:#2c6e49;color:#fff;border-color:transparent; }
.tbtn.grn:hover { background:#1e4d33; }
.tbtn.mla  { margin-left:auto; }
#save-status { font-size:.69rem;color:#999;font-style:italic;white-space:nowrap; }

/* DROPDOWN */
.dwrap { position:relative; }
.dmenu {
  display: none;
  position: absolute;
  top: 100%; /* Direkt unter dem Button */
  right: 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  min-width: 195px;
  z-index: 1000; /* Sicherstellen, dass es über dem Editor schwebt */
  overflow: hidden;
  margin-top: 5px;
}
.dmenu.open { display:block; }
.ditem { padding:9px 14px;cursor:pointer;font-size:.79rem;color:var(--ink);display:flex;align-items:center;gap:8px;transition:background .1s; }
.ditem:hover { background:#f5f0e8; }
.ditem .ext { font-size:.66rem;background:#eee;padding:2px 4px;border-radius:3px;font-family:monospace;color:#666; }
.ditem.div { border-top:1px solid #f0ece0; }

/* ── FORMAT BAR ── */
#fmt-bar {
  display:flex; align-items:center; gap:4px; flex-wrap:wrap;
  padding:7px 18px;
  background:rgba(255,255,255,0.75);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(6px);
  transition:background .4s;
}
.fbtn {
  width:29px;height:28px;
  border:1px solid transparent; border-radius:5px;
  background:transparent; cursor:pointer; color:#444;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem; font-weight:bold; transition:background .12s,color .12s;
  flex-shrink:0;
}
.fbtn:hover { background:#f0ece0; color:#1a1a1a; }
.fbtn.active { background:#e8e0d0; color:var(--accent); border-color:rgba(0,0,0,0.1); }
.fbtn.bold-btn   { font-family:'Playfair Display',serif; font-weight:700; }
.fbtn.ital-btn   { font-family:'Lora',serif; font-style:italic; font-weight:400; }
.fbtn.under-btn  { text-decoration:underline; font-family:'Lora',serif; }
.fbtn.strike-btn { text-decoration:line-through; font-family:'Lora',serif; }

.fsep { width:1px;height:20px;background:var(--border);margin:0 3px;flex-shrink:0; }

.fsel {
  height:28px; padding:0 6px;
  border:1px solid var(--border); border-radius:5px;
  background:white; font-family:'Lora',serif; font-size:.75rem;
  color:var(--ink); cursor:pointer; outline:none;
  transition:border-color .15s;
}
.fsel:focus { border-color:var(--accent); }

.fcolor-wrap { position:relative; display:flex; align-items:center; }
.fcolor-preview {
  width:28px;height:28px;border-radius:5px;border:1px solid var(--border);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;background:white;transition:background .12s;
}
.fcolor-preview:hover { background:#f0ece0; }
.fcolor-preview span { font-size:.7rem;font-weight:bold;line-height:1; }
.fcolor-preview .bar { width:14px;height:3px;border-radius:1px; }
#text-color-input { position:absolute;opacity:0;width:0;height:0; }

/* ── PAPER ── */
#paper-wrap { flex:1;overflow-y:auto;padding:32px 40px;display:flex;justify-content:center; }
#paper-wrap::-webkit-scrollbar { width:6px; }
#paper-wrap::-webkit-scrollbar-thumb { background:#ccc;border-radius:3px; }
#paper {
  width:100%;max-width:760px;min-height:100%;
  background:#fff9ed;border-radius:3px;
  box-shadow:var(--shadow),2px 0 0 #e8e0cf,4px 0 0 #d8d0bf;
  padding:46px 54px;position:relative;
  transition:background .4s;
}
#paper::before {
  content:'';position:absolute;inset:0;border-radius:3px;
  background-image:repeating-linear-gradient(transparent,transparent 31px,rgba(0,0,0,0.035) 31px,rgba(0,0,0,0.035) 32px);
  background-position:0 46px;pointer-events:none;
}
#paper::after {
  content:'';position:absolute;left:94px;top:0;bottom:0;width:1px;
  background:rgba(192,57,43,0.16);pointer-events:none;
}
#note-editor {
  width:100%;min-height:480px;
  background:transparent;border:none;outline:none;
  font-family:'Lora',Georgia,serif;font-size:1rem;line-height:2rem;
  color:var(--ink);position:relative;z-index:1;
  word-break:break-word;
}
#note-editor:empty::before { content:attr(data-placeholder);color:#bbb;font-style:italic;pointer-events:none; }

/* ── WELCOME ── */
#welcome { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;opacity:.55; }
#welcome .icon { font-size:3.8rem;margin-bottom:14px; }
#welcome h2 { font-family:'Playfair Display',serif;font-size:1.45rem;margin-bottom:8px; }
#welcome p  { font-size:.86rem;color:#888;font-style:italic; }

/* ── FULLSCREEN ── */
/* Neu: Sidebar bleibt im Vollbild verfügbar */
:fullscreen #sidebar { 
  display: flex; 
  z-index: 2001; 
}
:fullscreen #sidebar-toggle {
  opacity: 0.5;
}
:fullscreen #sidebar-toggle:hover {
  opacity: 1;
}

/* Optional: Damit das Papier im Vollbild mehr Platz hat, 
   wenn die Sidebar eingeklappt ist */
:fullscreen #paper-wrap { 
  padding: 40px; 
}

/* ── TOAST ── */
#toast {
  position:fixed;bottom:26px;right:26px;
  background:#252525;color:#f0ece0;
  padding:9px 18px;border-radius:6px;font-size:.8rem;
  font-family:'Lora',serif;box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;
  pointer-events:none;z-index:999;
}
#toast.show { opacity:1;transform:translateY(0); }

@media(max-width:640px){
  #sidebar{width:200px;min-width:200px;}
  #paper-wrap{padding:18px 10px;}
  #paper{padding:28px 22px;}
}

/* Der Button zum Ein/Ausklappen */
#sidebar-toggle {
  position: fixed;
  left: 252px;
  top: 15px; /* Etwas weiter oben, um mittig zur Toolbar zu wirken */
  z-index: 2000; /* Höher als Toolbar (500) und Dropdown (1000) */
  background: var(--sidebar);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 0 5px 5px 0;
  padding: 8px 5px;
  cursor: pointer;
  transition: left 0.3s ease, background 0.2s;
}

#sidebar-toggle:hover {
  background: var(--accent);
}

/* Zustand wenn die Sidebar eingeklappt ist */
body.sidebar-closed #sidebar {
  margin-left: -252px; /* Schiebt die Sidebar aus dem Bild */
}

body.sidebar-closed #sidebar-toggle {
  left: 0;
}

/* Sanfter Übergang für die Sidebar */
#sidebar {
  transition: margin-left 0.3s ease;
}

/* Anpassung für den Toggle-Pfeil */
body.sidebar-closed #sidebar-toggle {
  content: "»"; /* Wir ändern das Zeichen via JS, aber hier ist die Logik */
}
#note-editor img {
  max-width: 100%;
  border-radius: 6px;
  margin: 8px 0;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  transition: box-shadow .2s;
  display: block;
}
#note-editor img:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.18); }
#note-editor a { color: var(--accent); text-decoration: underline; cursor: pointer; }
#note-editor a:hover { color: #a93226; }

/* ── IMAGE RESIZE UI ── */
#img-resize-wrap {
  position: absolute;
  pointer-events: none;
  z-index: 800;
  display: none;
}
#img-resize-wrap.active { display: block; }
#img-resize-border {
  position: absolute; inset: 0;
  border: 2px solid var(--accent);
  border-radius: 6px;
  pointer-events: none;
}
.img-handle {
  position: absolute;
  width: 10px; height: 10px;
  background: #fff;
  border: 2px solid var(--accent);
  border-radius: 2px;
  pointer-events: all;
  z-index: 801;
}
.img-handle.nw { top:-5px;  left:-5px;  cursor: nw-resize; }
.img-handle.ne { top:-5px;  right:-5px; cursor: ne-resize; }
.img-handle.sw { bottom:-5px; left:-5px;  cursor: sw-resize; }
.img-handle.se { bottom:-5px; right:-5px; cursor: se-resize; }
.img-handle.n  { top:-5px;  left:50%; transform:translateX(-50%); cursor: n-resize; }
.img-handle.s  { bottom:-5px; left:50%; transform:translateX(-50%); cursor: s-resize; }
.img-handle.w  { left:-5px; top:50%; transform:translateY(-50%); cursor: w-resize; }
.img-handle.e  { right:-5px; top:50%; transform:translateY(-50%); cursor: e-resize; }
#img-size-label {
  position: absolute;
  bottom: -24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.65); color: #fff;
  font-size: .65rem; font-family: 'Inter', sans-serif;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  pointer-events: none;
}
#img-toolbar {
  position: absolute;
  top: -34px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px;
  pointer-events: all;
}
.img-tb-btn {
  background: rgba(0,0,0,0.72); color: #fff;
  border: none; border-radius: 4px;
  font-size: .68rem; padding: 4px 8px;
  cursor: pointer; white-space: nowrap;
  font-family: 'Inter', sans-serif;
  transition: background .15s;
}
.img-tb-btn:hover { background: var(--accent); }
.img-tb-btn.del { background: rgba(180,0,0,.75); }
</style>
</head>
<body>
    <button id="sidebar-toggle" onclick="toggleSidebar()" title="Sidebar umschalten">
        «
    </button>
<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>
      📒 Notizen
    </h1>
    <p>
    Deine persönlichen Gedanken
    </p>
  </div>
  <button id="new-note-btn" onclick="newNote()">
  ＋ Neue Notiz
</button>

<div id="search-container" style="padding: 0 14px 10px;">
      <input type="text" id="search-input" placeholder="Notizen durchsuchen..." oninput="filterNotes()" 
             style="width: 100%; padding: 8px 10px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.1); 
                    background: rgba(0,0,0,0.2); color: #fff; font-size: 0.8rem; outline: none;">
    </div>

  <div id="notes-list">
    <div class="empty-state">
      Noch keine Notizen.
      <br>
      Erstelle deine erste!
    </div>
  </div>
  <div id="bg-section">
    <label>
      🎨 Hintergrund
    </label>  
    <div id="bg-grid">
    </div>
      <input type="color" id="custom-bg" value="#f5f0e8" oninput="applyCustomBg(this.value)">
    </div>

  <!-- Import: JSON-Backup laden (Sidebar) -->
  <div style="padding:10px 14px 14px;">
    <label style="font-size:.65rem;color:#777;text-transform:uppercase;letter-spacing:.09em;display:block;margin-bottom:8px;">📥 Notizen laden</label>
    <button onclick="document.getElementById('import-json').click()" style="width:100%;padding:8px 10px;background:rgba(255,255,255,0.08);color:#d4cfc4;border:1px solid rgba(255,255,255,0.12);border-radius:5px;font-size:.77rem;cursor:pointer;text-align:left;transition:background .15s;" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
      📦 JSON-Backup laden
    </button>
    <button onclick="document.getElementById('import-file').click()" style="width:100%;margin-top:5px;padding:8px 10px;background:rgba(255,255,255,0.08);color:#d4cfc4;border:1px solid rgba(255,255,255,0.12);border-radius:5px;font-size:.77rem;cursor:pointer;text-align:left;transition:background .15s;" onmouseover="this.style.background='rgba(255,255,255,0.14)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
      📄 Textdatei als Notiz
    </button>
  </div>
</div>

<input type="file" id="import-json" accept=".json" style="display:none" onchange="importJson(this)">
<input type="file" id="import-file" accept=".txt,.md,.html" style="display:none" onchange="importTextFile(this)">

<!-- MAIN -->
<div id="main">
  <div id="welcome">
    <div class="icon">✍️</div>
    <h2>Bereit zum Schreiben</h2>
    <p>Wähle eine Notiz oder erstelle eine neue.</p>
  </div>

  <div id="editor-area" style="display:none;flex:1;flex-direction:column;overflow:hidden;">

    <!-- TOP TOOLBAR -->
    <div id="toolbar">
      <input id="note-title-input" type="text" placeholder="Titel der Notiz…" oninput="markDirty()">
      <div class="tsep"></div>
      <div id="color-palette"></div>
      <div class="tsep"></div>
      <button class="tbtn red" onclick="saveNote()">💾 Speichern</button>
      <div class="dwrap">
        <button class="tbtn grn" onclick="toggleDrop('exp-menu',event)">⬇ Export ▾</button>
        <div class="dmenu" id="exp-menu">
          <div class="ditem" onclick="exportAs('txt')">📄 Textdatei <span class="ext">.txt</span></div>
          <div class="ditem" onclick="exportAs('md')">📝 Markdown <span class="ext">.md</span></div>
          <div class="ditem" onclick="exportAs('html')">🌐 HTML-Seite <span class="ext">.html</span></div>
          <div class="ditem div" onclick="exportAll()">📦 Alle Notizen <span class="ext">.json</span></div>
        </div>
      </div>
      <span id="save-status"></span>
      <button class="tbtn mla" onclick="toggleFullscreen()" title="Vollbild">⛶ Vollbild</button>
    </div>

    <!-- FORMAT BAR -->
    <div id="fmt-bar">

      <!-- Font family -->
      <select class="fsel" id="sel-font" onchange="applyFont(this.value)" title="Schriftart" style="width:120px;">
        <option value="Lora, Georgia, serif">Lora (Standard)</option>
        <option value="'Playfair Display', serif">Playfair Display</option>
        <option value="'Dancing Script', cursive">Dancing Script</option>
        <option value="'Inter', sans-serif">Inter</option>
        <option value="'Courier Prime', monospace">Courier (Mono)</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
      </select>

      <!-- Font size -->
      <select class="fsel" id="sel-size" onchange="applySize(this.value)" title="Schriftgröße" style="width:62px;">
        <option value="0.75rem">10</option>
        <option value="0.85rem">12</option>
        <option value="0.95rem">13</option>
        <option value="1rem" selected>14</option>
        <option value="1.1rem">15</option>
        <option value="1.2rem">17</option>
        <option value="1.4rem">20</option>
        <option value="1.6rem">23</option>
        <option value="1.9rem">27</option>
        <option value="2.2rem">32</option>
      </select>

      <div class="fsep"></div>

      <!-- B I U S -->
      <button class="fbtn bold-btn"   id="btn-bold"   onclick="fmt('bold')"          title="Fett (Strg+B)">B</button>
      <button class="fbtn ital-btn"   id="btn-italic" onclick="fmt('italic')"        title="Kursiv (Strg+I)">I</button>
      <button class="fbtn under-btn"  id="btn-under"  onclick="fmt('underline')"     title="Unterstrichen (Strg+U)">U</button>
      <button class="fbtn strike-btn" id="btn-strike" onclick="fmt('strikeThrough')" title="Durchgestrichen">S</button>

      <div class="fsep"></div>

      <!-- Heading -->
      <button class="fbtn" style="width:auto;padding:0 8px;font-family:'Playfair Display',serif;font-size:.75rem;" onclick="fmt('formatBlock','h1')" title="Überschrift 1">H1</button>
      <button class="fbtn" style="width:auto;padding:0 8px;font-family:'Playfair Display',serif;font-size:.75rem;" onclick="fmt('formatBlock','h2')" title="Überschrift 2">H2</button>
      <button class="fbtn" style="width:auto;padding:0 8px;font-size:.75rem;" onclick="fmt('formatBlock','p')" title="Normaler Text">¶</button>

      <div class="fsep"></div>

      <!-- Align -->
      <button class="fbtn" onclick="fmt('justifyLeft')"   title="Linksbündig">⬅</button>
      <button class="fbtn" onclick="fmt('justifyCenter')" title="Zentriert">↔</button>
      <button class="fbtn" onclick="fmt('justifyRight')"  title="Rechtsbündig">➡</button>

      <div class="fsep"></div>

      <!-- Lists -->
      <button class="fbtn" onclick="fmt('insertUnorderedList')" title="Aufzählung" style="font-size:.9rem;">•≡</button>
      <button class="fbtn" onclick="fmt('insertOrderedList')"   title="Nummerierte Liste" style="font-size:.75rem;">1≡</button>

      <div class="fsep"></div>

      <!-- Text color -->
      <div class="fsep"> </div>

      <div class="fcolor-wrap" title="Textfarbe">
        <div class="fcolor-preview" onclick="document.getElementById('text-color-input').click()">
          <span id="tc-letter" style="color:#1a1a1a;">A</span>
          <div class="bar" id="tc-bar" style="background:#1a1a1a;"></div>
        </div>
        <input id="text-color-input" oninput="applyTextColor(this.value)" type="color" value="#1a1a1a"/>
      </div>

      <div class="fcolor-wrap" title="Markieren">
        <div class="fcolor-preview" onclick="document.getElementById('hl-color-input').click()">
          <span style="font-size:.7rem;color:#333;">✏️</span>
          <div class="bar" id="hl-bar" style="background:#fff176;"></div>
        </div>
        <input id="hl-color-input" oninput="applyHighlight(this.value)" type="color" value="#fff176"/>
      </div>

     <div class="fsep"> </div>

      <div class="fsep"></div>

      <!-- Clear formatting -->
      <button class="fbtn" onclick="fmt('removeFormat')" title="Formatierung entfernen" style="font-size:.7rem;width:auto;padding:0 7px;color:#999;">✕ fmt</button>

      <div class="fsep"></div>

      <!-- Bild einfügen -->
      <button class="fbtn" onclick="document.getElementById('img-upload').click()" title="Bild einfügen" style="font-size:.85rem;width:auto;padding:0 8px;">🖼</button>
      <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="insertImage(this)">

      <!-- Hyperlink -->
      <button class="fbtn" id="btn-link" onclick="toggleLinkDialog()" title="Link einfügen / entfernen" style="font-size:.78rem;width:auto;padding:0 8px;">🔗</button>

    </div>

    <!-- LINK DIALOG -->
    <div id="link-dialog" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
         background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.18);
         z-index:2000;padding:22px 24px;min-width:320px;font-family:'Lora',serif;">
      <div style="font-size:.9rem;font-weight:600;margin-bottom:14px;color:var(--ink);">🔗 Link einfügen</div>
      <input id="link-text" type="text" placeholder="Linktext (leer = markierter Text)"
             style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;
                    font-family:'Lora',serif;font-size:.82rem;margin-bottom:9px;outline:none;box-sizing:border-box;">
      <input id="link-url" type="url" placeholder="https://..." autofocus
             style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;
                    font-family:'Lora',serif;font-size:.82rem;margin-bottom:14px;outline:none;box-sizing:border-box;"
             onkeydown="if(event.key==='Enter')insertLink()">
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="closeLinkDialog()" style="padding:7px 14px;border:1px solid var(--border);border-radius:6px;
                background:white;font-family:'Lora',serif;font-size:.78rem;cursor:pointer;">Abbrechen</button>
        <button onclick="removeLink()" style="padding:7px 14px;border:1px solid var(--border);border-radius:6px;
                background:#f5f0e8;font-family:'Lora',serif;font-size:.78rem;cursor:pointer;">Link entfernen</button>
        <button onclick="insertLink()" style="padding:7px 14px;border:none;border-radius:6px;
                background:var(--accent);color:#fff;font-family:'Lora',serif;font-size:.78rem;cursor:pointer;">Einfügen</button>
      </div>
    </div>
    <div id="link-overlay" style="display:none;position:fixed;inset:0;z-index:1999;" onclick="closeLinkDialog()"></div>

    <!-- PAPER -->
    <div id="paper-wrap">
      <div id="paper">
        <div id="note-editor"
             contenteditable="true"
             data-placeholder="Fange an zu schreiben…"
             oninput="markDirty(); updateFormatState();"
             onkeyup="updateFormatState()"
             onmouseup="updateFormatState()"
             onkeydown="handleEditorKey(event)">
        </div>
      </div>
    </div>
  </div>
</div>

<div id="img-resize-wrap">
  <div id="img-toolbar">
    <button class="img-tb-btn" onclick="imgSetSize('25%')">25%</button>
    <button class="img-tb-btn" onclick="imgSetSize('50%')">50%</button>
    <button class="img-tb-btn" onclick="imgSetSize('75%')">75%</button>
    <button class="img-tb-btn" onclick="imgSetSize('100%')">100%</button>
    <button class="img-tb-btn" onclick="imgSetAlign('left')"  title="Links">⬅</button>
    <button class="img-tb-btn" onclick="imgSetAlign('center')" title="Mitte">↔</button>
    <button class="img-tb-btn" onclick="imgSetAlign('right')" title="Rechts">➡</button>
    <button class="img-tb-btn del" onclick="imgDelete()" title="Bild löschen">🗑</button>
  </div>
  <div id="img-resize-border"></div>
  <div class="img-handle nw" data-dir="nw"></div>
  <div class="img-handle ne" data-dir="ne"></div>
  <div class="img-handle sw" data-dir="sw"></div>
  <div class="img-handle se" data-dir="se"></div>
  <div class="img-handle n"  data-dir="n"></div>
  <div class="img-handle s"  data-dir="s"></div>
  <div class="img-handle w"  data-dir="w"></div>
  <div class="img-handle e"  data-dir="e"></div>
  <div id="img-size-label"></div>
</div>

<div id="toast"></div>

<script>

// ── SELECTION MANAGER (Verhindert das Verschwinden der Markierung) ──
let savedSelection = null;

// Speichert automatisch jede Markierung, die im Editor gemacht wird
document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  const ed = document.getElementById('note-editor');
  if (sel.rangeCount > 0 && ed && ed.contains(sel.anchorNode)) {
    savedSelection = sel.getRangeAt(0).cloneRange();
  }
});

function restoreSelection() {
  if (savedSelection) {
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedSelection);
    return true;
  }
  return false;
}

// ── NOTE PAPER COLORS ──
const COLORS = [
  {name:'Creme',      bg:'#fff9ed', label:'#c0392b'},
  {name:'Mintgrün',   bg:'#edfaf1', label:'#27ae60'},
  {name:'Himmelblau', bg:'#edf5fd', label:'#2980b9'},
  {name:'Lavendel',   bg:'#f5edfb', label:'#8e44ad'},
  {name:'Rosé',       bg:'#fdedf2', label:'#e91e7a'},
  {name:'Gelb',       bg:'#fdfbed', label:'#d4ac0d'},
  {name:'Pfirsich',   bg:'#fdf0ed', label:'#e67e22'},
  {name:'Dunkel',     bg:'#1e1e2e', label:'#a29bfe'},
];
const pal = document.getElementById('color-palette');

if(pal) {
  COLORS.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='csw'+(i===0?' sel':'');
    s.title=c.name; s.style.background=c.bg;
    s.style.boxShadow='inset 0 0 0 1px rgba(0,0,0,0.1)';
    s.onclick=()=>setNoteColor(i); pal.appendChild(s);
  });
}

function setNoteColor(idx){
  document.querySelectorAll('.csw').forEach((s,i)=>s.classList.toggle('sel',i===idx));
  const c=COLORS[idx];
  document.getElementById('paper').style.background=c.bg;
  const dark=idx===7;
  const ed=document.getElementById('note-editor');
  ed.style.color=dark?'#e0deff':'#1a1a1a';
  if(currentNote){currentNote.color=idx;markDirty();}
}

// ── APP BACKGROUND ──
const BGS=[
  {l:'Sand',     css:'#f5f0e8'},
  {l:'Weiß',     css:'#ffffff'},
  {l:'Hellgrau', css:'#ebebeb'},
  {l:'Eisblau',  css:'#dce8f0'},
  {l:'Salbei',   css:'#d6ead6'},
  {l:'Altrosa',  css:'#f0dce4'},
  {l:'Nacht',    css:'linear-gradient(135deg,#1a1a2e,#0f3460)', dark:true},
  {l:'Morgen',   css:'linear-gradient(135deg,#ffecd2,#fcb69f)'},
  {l:'Ozean',    css:'linear-gradient(135deg,#a1c4fd,#c2e9fb)'},
  {l:'Wald',     css:'linear-gradient(135deg,#134e5e,#71b280)',  dark:true},
  {l:'Sonne',    css:'linear-gradient(135deg,#f7971e,#ffd200)'},
  {l:'Lavendel', css:'linear-gradient(135deg,#e0c3fc,#8ec5fc)'},
  {l:'Abend',    css:'linear-gradient(135deg,#f093fb,#f5576c)', dark:true},
  {l:'Schiefer', css:'linear-gradient(135deg,#2c3e50,#4a5568)',  dark:true},
  {l:'Eigene',   css:'custom'},
];
const bgGrid=document.getElementById('bg-grid');
BGS.forEach((b,i)=>{
  const s=document.createElement('div');
  s.className='bg-sw'+(i===0?' sel':'');
  s.title=b.l;
  if(b.css==='custom'){s.classList.add('pick');s.innerHTML='✏️';s.onclick=()=>document.getElementById('custom-bg').click();}
  else{s.style.background=b.css;s.onclick=()=>applyBg(i);}
  bgGrid.appendChild(s);
});

function applyBg(idx){
  document.querySelectorAll('.bg-sw').forEach((s,i)=>s.classList.toggle('sel',i===idx));
  const b=BGS[idx];
  document.body.style.background=b.css;
  setToolbarTheme(!!b.dark);
  localStorage.setItem('notizen_bg',JSON.stringify({t:'p',i:idx}));
}
function applyCustomBg(hex){
  document.querySelectorAll('.bg-sw').forEach((s,i)=>s.classList.toggle('sel',i===BGS.length-1));
  document.body.style.background=hex;
  const dark=darkHex(hex);
  setToolbarTheme(dark);
  localStorage.setItem('notizen_bg',JSON.stringify({t:'c',v:hex}));
}
function darkHex(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return(r*.299+g*.587+b*.114)<100;
}
function setToolbarTheme(dark){
  const tb=document.getElementById('toolbar');
  const fb=document.getElementById('fmt-bar');
  tb.style.background=dark?'rgba(15,20,40,0.93)':'rgba(245,240,232,0.95)';
  fb.style.background=dark?'rgba(20,25,50,0.75)':'rgba(255,255,255,0.75)';
  const inp=document.getElementById('note-title-input');
  if(inp)inp.style.color=dark?'#e0e0f0':'#1a1a1a';
}

// ── FORMAT HELPERS ──
function fmt(cmd,val=null){
  document.getElementById('note-editor').focus();
  restoreSelection();
  document.execCommand(cmd,false,val);
  updateFormatState();
  markDirty();
}

function applyFont(val){
  const ed=document.getElementById('note-editor');
  ed.style.fontFamily=val;
  if(currentNote){currentNote.fontFamily=val;markDirty();}
}

function applySize(val){
  const ed=document.getElementById('note-editor');
  ed.style.fontSize=val;
  ed.style.lineHeight=parseFloat(val)>1.3?'2.4rem':'2rem';
  if(currentNote){currentNote.fontSize=val;markDirty();}
}

function applyTextColor(hex){
  document.getElementById('tc-letter').style.color=hex;
  document.getElementById('tc-bar').style.background=hex;
  const ed = document.getElementById('note-editor');
  ed.focus();
  if(restoreSelection()){
    document.execCommand('foreColor',false,hex);
  }
  markDirty();
}

function applyHighlight(hex){
  document.getElementById('hl-bar').style.background=hex;
  const ed = document.getElementById('note-editor');
  ed.focus();
  if(restoreSelection()){
    document.execCommand('hiliteColor',false,hex);
  }
  markDirty();
}

function removeHighlight() {
  const ed = document.getElementById('note-editor');
  ed.focus();
  restoreSelection();
  document.execCommand('hiliteColor', false, 'transparent');
  markDirty();
}

function updateFormatState(){
  document.getElementById('btn-bold').classList.toggle('active',document.queryCommandState('bold'));
  document.getElementById('btn-italic').classList.toggle('active',document.queryCommandState('italic'));
  document.getElementById('btn-under').classList.toggle('active',document.queryCommandState('underline'));
  document.getElementById('btn-strike').classList.toggle('active',document.queryCommandState('strikeThrough'));
}
function handleEditorKey(e){
  if((e.ctrlKey||e.metaKey)){
    if(e.key==='b'){e.preventDefault();fmt('bold');}
    else if(e.key==='i'){e.preventDefault();fmt('italic');}
    else if(e.key==='u'){e.preventDefault();fmt('underline');}
    else if(e.key==='s'){e.preventDefault();saveNote();}
  }
}

// ── STATE ──
let notes=JSON.parse(localStorage.getItem('notizen_v2')||'[]');
let currentNote=null,dirty=false,saveTimer=null;

function markDirty(){
  dirty=true;
  document.getElementById('save-status').textContent='Nicht gespeichert…';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveNote,4000);
}

function renderList(){
  const list=document.getElementById('notes-list');
  if(!notes.length){list.innerHTML='<div class="empty-state">Noch keine Notizen.<br>Erstelle deine erste!</div>';return;}
  list.innerHTML=notes.map(n=>{
    const col=COLORS[n.color??0];
    const title=n.title||'Ohne Titel';
    const date=new Date(n.updated).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'2-digit'});
    const active=currentNote&&currentNote.id===n.id?' active':'';
    return`<div class="note-item${active}" onclick="openNote('${n.id}')">
      <span class="note-item-dot" style="background:${col.bg};border:2px solid ${col.label}"></span>
      <span class="note-item-title">${escHtml(title)}</span>
      <button class="note-item-del" onclick="deleteNote(event,'${n.id}')">✕</button>
      <div class="note-item-date">${date}</div>
    </div>`;
  }).join('');
}

function filterNotes() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('notes-list');
  
  if (!notes.length) return;

  // Filtere die Notizen basierend auf Titel oder Inhalt
  const filtered = notes.filter(n => 
    (n.title && n.title.toLowerCase().includes(query)) || 
    (n.body && n.body.toLowerCase().includes(query))
  );

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">Keine passenden Notizen gefunden.</div>';
    return;
  }

  // Render die gefilterte Liste
  list.innerHTML = filtered.map(n => {
    const col = COLORS[n.color ?? 0];
    const title = n.title || 'Ohne Titel';
    const date = new Date(n.updated).toLocaleDateString('de-DE', {day:'2-digit', month:'short', year:'2-digit'});
    const active = currentNote && currentNote.id === n.id ? ' active' : '';
    
    return `<div class="note-item${active}" onclick="openNote('${n.id}')">
      <span class="note-item-dot" style="background:${col.bg}; border:2px solid ${col.label}"></span>
      <span class="note-item-title">${escHtml(title)}</span>
      <button class="note-item-del" onclick="deleteNote(event,'${n.id}')">✕</button>
      <div class="note-item-date">${date}</div>
    </div>`;
  }).join('');
}

function newNote(){
  const n={id:Date.now().toString(),title:'',body:'',color:0,fontFamily:'Lora, Georgia, serif',fontSize:'1rem',created:Date.now(),updated:Date.now()};
  notes.unshift(n);saveAll();openNote(n.id);
}

function openNote(id){
  if(dirty&&currentNote)saveNote(false);
  currentNote=notes.find(n=>n.id===id);
  if(!currentNote)return;
  document.getElementById('welcome').style.display='none';
  document.getElementById('editor-area').style.display='flex';
  document.getElementById('note-title-input').value=currentNote.title;
  const ed=document.getElementById('note-editor');
  ed.innerHTML=currentNote.body||'';
  ed.style.fontFamily=currentNote.fontFamily||'Lora, Georgia, serif';
  ed.style.fontSize=currentNote.fontSize||'1rem';
  // sync selects
  document.getElementById('sel-font').value=currentNote.fontFamily||'Lora, Georgia, serif';
  document.getElementById('sel-size').value=currentNote.fontSize||'1rem';
  setNoteColor(currentNote.color??0);
  dirty=false;
  document.getElementById('save-status').textContent='';
  renderList();
  ed.focus();
}

function saveNote(toast=true){
  if(!currentNote)return;
  currentNote.title=document.getElementById('note-title-input').value;
  currentNote.body=document.getElementById('note-editor').innerHTML;
  currentNote.updated=Date.now();
  saveAll();dirty=false;
  document.getElementById('save-status').textContent='✓ Gespeichert';
  setTimeout(()=>{if(document.getElementById('save-status').textContent==='✓ Gespeichert')document.getElementById('save-status').textContent='';},2200);
  if(toast)showToast('Notiz gespeichert ✓');
  renderList();
}

function deleteNote(e,id){
  e.stopPropagation();
  if(!confirm('Diese Notiz wirklich löschen?'))return;
  notes=notes.filter(n=>n.id!==id);
  if(currentNote&&currentNote.id===id){
    currentNote=null;dirty=false;
    document.getElementById('editor-area').style.display='none';
    document.getElementById('welcome').style.display='flex';
    if(notes.length>0)setTimeout(()=>openNote(notes[0].id),10);
  }
  saveAll();renderList();showToast('Notiz gelöscht');
}
function saveAll(){localStorage.setItem('notizen_v2',JSON.stringify(notes));}

// ── EXPORT ──
function toggleDrop(id,e){
  e.stopPropagation();
  document.querySelectorAll('.dmenu').forEach(m=>m.classList.remove('open'));
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click',()=>document.querySelectorAll('.dmenu').forEach(m=>m.classList.remove('open')));

function exportAs(fmt){
  document.getElementById('exp-menu').classList.remove('open');
  if(!currentNote){showToast('Keine Notiz geöffnet');return;}
  saveNote(false);
  const title=currentNote.title||'Notiz';
  const htmlBody=currentNote.body||'';
  const date=new Date(currentNote.updated).toLocaleString('de-DE');
  let content,mime,ext;

  if(fmt==='txt'){
    const tmp=document.createElement('div');tmp.innerHTML=htmlBody;
    const plain=tmp.innerText;
    const bar='─'.repeat(Math.max(title.length,6));
    content=`${title}\n${bar}\nDatum: ${date}\n\n${plain}`;
    mime='text/plain';ext='txt';
  } else if(fmt==='md'){
    const tmp=document.createElement('div');tmp.innerHTML=htmlBody;
    content=`# ${title}\n_${date}_\n\n${tmp.innerText}`;
    mime='text/markdown';ext='md';
  } else {
    const noteCol=COLORS[currentNote.color??0].bg;
    const ff=currentNote.fontFamily||'Georgia,serif';
    const fs=currentNote.fontSize||'1rem';
    content=`<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>${escHtml(title)}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;1,400&family=Dancing+Script:wght@500&family=Inter&family=Courier+Prime&display=swap" rel="stylesheet">
<style>body{font-family:${ff};font-size:${fs};max-width:760px;margin:60px auto;padding:46px 54px;background:${noteCol};line-height:2rem;color:#1a1a1a;border-radius:3px;box-shadow:0 4px 24px rgba(0,0,0,.12);}h1{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:.2em;}small{color:#999;}hr{border:none;border-top:1px solid rgba(0,0,0,0.08);margin:18px 0;}</style>
</head><body><h1>${escHtml(title)}</h1><small>${date}</small><hr>${htmlBody}</body></html>`;
    mime='text/html';ext='html';
  }
  dlBlob(content,safe(title)+'.'+ext,mime);
  showToast('Als .'+ext+' exportiert ✓');
}

function exportAll(){
  document.getElementById('exp-menu').classList.remove('open');
  if(!notes.length){showToast('Keine Notizen vorhanden');return;}
  dlBlob(JSON.stringify(notes,null,2),'meine-notizen.json','application/json');
  showToast(notes.length+' Notizen exportiert ✓');
}
function dlBlob(content,filename,mime){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime+';charset=utf-8'}));
  a.download=filename;a.click();URL.revokeObjectURL(a.href);
}
function safe(s){return(s||'Notiz').replace(/[\\/:*?"<>|]/g,'_').substring(0,64);}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleFullscreen(){
  const el=document.documentElement;
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)
    (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

function toggleSidebar() {
  document.body.classList.toggle('sidebar-closed');
  document.getElementById('sidebar-toggle').textContent = document.body.classList.contains('sidebar-closed') ? '»' : '«';
}

// ── IMAGE RESIZE ──
let activeImg = null;
let resizing = false, resizeDir = '', resizeStartX = 0, resizeStartY = 0, resizeStartW = 0, resizeStartH = 0;

function positionResizeWrap() {
  if (!activeImg) return;
  const wrap = document.getElementById('img-resize-wrap');
  const paperWrap = document.getElementById('paper-wrap');
  const imgRect  = activeImg.getBoundingClientRect();
  const contRect = paperWrap.getBoundingClientRect();
  wrap.style.left   = (imgRect.left - contRect.left + paperWrap.scrollLeft) + 'px';
  wrap.style.top    = (imgRect.top  - contRect.top  + paperWrap.scrollTop)  + 'px';
  wrap.style.width  = imgRect.width  + 'px';
  wrap.style.height = imgRect.height + 'px';
  document.getElementById('img-size-label').textContent =
    Math.round(imgRect.width) + ' × ' + Math.round(imgRect.height) + ' px';
}

function selectImg(img) {
  activeImg = img;
  const wrap = document.getElementById('img-resize-wrap');
  wrap.classList.add('active');
  // Move wrap into paper-wrap so offsets are relative
  const paperWrap = document.getElementById('paper-wrap');
  if (wrap.parentElement !== paperWrap) {
    paperWrap.style.position = 'relative';
    paperWrap.appendChild(wrap);
  }
  positionResizeWrap();
}

function deselectImg() {
  activeImg = null;
  document.getElementById('img-resize-wrap').classList.remove('active');
}

// Click on image → select
document.addEventListener('click', e => {
  const ed = document.getElementById('note-editor');
  if (e.target.tagName === 'IMG' && ed.contains(e.target)) {
    e.preventDefault();
    selectImg(e.target);
  } else if (!e.target.closest('#img-resize-wrap')) {
    deselectImg();
  }
});

// Reposition on scroll
document.getElementById('paper-wrap')?.addEventListener('scroll', () => {
  if (activeImg) positionResizeWrap();
});

// Drag-resize handles
document.addEventListener('mousedown', e => {
  const handle = e.target.closest('.img-handle');
  if (!handle || !activeImg) return;
  e.preventDefault();
  resizing    = true;
  resizeDir   = handle.dataset.dir;
  resizeStartX = e.clientX;
  resizeStartY = e.clientY;
  resizeStartW = activeImg.getBoundingClientRect().width;
  resizeStartH = activeImg.getBoundingClientRect().height;
});

document.addEventListener('mousemove', e => {
  if (!resizing || !activeImg) return;
  const dx = e.clientX - resizeStartX;
  const dy = e.clientY - resizeStartY;
  let newW = resizeStartW, newH = resizeStartH;
  const aspect = resizeStartW / resizeStartH;

  if (resizeDir === 'se') { newW = Math.max(40, resizeStartW + dx); newH = newW / aspect; }
  else if (resizeDir === 'sw') { newW = Math.max(40, resizeStartW - dx); newH = newW / aspect; }
  else if (resizeDir === 'ne') { newW = Math.max(40, resizeStartW + dx); newH = newW / aspect; }
  else if (resizeDir === 'nw') { newW = Math.max(40, resizeStartW - dx); newH = newW / aspect; }
  else if (resizeDir === 'e')  { newW = Math.max(40, resizeStartW + dx); }
  else if (resizeDir === 'w')  { newW = Math.max(40, resizeStartW - dx); }
  else if (resizeDir === 's')  { newH = Math.max(20, resizeStartH + dy); }
  else if (resizeDir === 'n')  { newH = Math.max(20, resizeStartH - dy); }

  activeImg.style.width  = Math.round(newW) + 'px';
  activeImg.style.height = (resizeDir === 'e' || resizeDir === 'w') ? '' : Math.round(newH) + 'px';
  positionResizeWrap();
});

document.addEventListener('mouseup', () => {
  if (resizing) { resizing = false; markDirty(); }
});

function imgSetSize(pct) {
  if (!activeImg) return;
  const paper = document.getElementById('paper');
  const maxW  = paper.clientWidth - 108; // Padding abziehen
  activeImg.style.width  = pct === '100%' ? '100%' : (maxW * parseInt(pct) / 100) + 'px';
  activeImg.style.height = '';
  setTimeout(positionResizeWrap, 30);
  markDirty();
}

function imgSetAlign(align) {
  if (!activeImg) return;
  activeImg.style.marginLeft  = align === 'center' ? 'auto' : (align === 'right' ? 'auto' : '0');
  activeImg.style.marginRight = align === 'center' ? 'auto' : (align === 'right' ? '0' : 'auto');
  activeImg.style.display     = 'block';
  setTimeout(positionResizeWrap, 30);
  markDirty();
}

function imgDelete() {
  if (!activeImg) return;
  if (!confirm('Bild wirklich löschen?')) return;
  activeImg.remove();
  deselectImg();
  markDirty();
  showToast('Bild gelöscht');
}

// ── BILD EINFÜGEN ──
function insertImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const ed = document.getElementById('note-editor');
    ed.focus();
    restoreSelection();
    const img = document.createElement('img');
    img.src = e.target.result;
    img.alt = file.name.replace(/\.[^.]+$/, '');
    img.title = img.alt;
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
      const range = sel.getRangeAt(0);
      range.deleteContents();
      range.insertNode(img);
      range.setStartAfter(img);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      ed.appendChild(img);
    }
    markDirty();
    showToast('✓ Bild eingefügt');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ── HYPERLINK ──
function toggleLinkDialog() {
  const dlg = document.getElementById('link-dialog');
  const ov  = document.getElementById('link-overlay');
  if (dlg.style.display === 'none') {
    // Prä-füllen: markierter Text
    const sel = window.getSelection();
    const selText = sel && sel.rangeCount > 0 ? sel.toString() : '';
    document.getElementById('link-text').value = selText;
    document.getElementById('link-url').value = '';
    // Prüfe ob Cursor auf einem Link sitzt
    const anchor = getAnchorAtCursor();
    if (anchor) {
      document.getElementById('link-url').value = anchor.href;
      document.getElementById('link-text').value = anchor.textContent;
    }
    dlg.style.display = 'block';
    ov.style.display  = 'block';
    setTimeout(() => document.getElementById('link-url').focus(), 50);
  } else {
    closeLinkDialog();
  }
}

function closeLinkDialog() {
  document.getElementById('link-dialog').style.display = 'none';
  document.getElementById('link-overlay').style.display = 'none';
}

function getAnchorAtCursor() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return null;
  let node = sel.getRangeAt(0).startContainer;
  while (node && node !== document) {
    if (node.nodeName === 'A') return node;
    node = node.parentNode;
  }
  return null;
}

function insertLink() {
  const url  = document.getElementById('link-url').value.trim();
  const text = document.getElementById('link-text').value.trim();
  if (!url) { showToast('Bitte eine URL eingeben'); return; }
  const fullUrl = /^https?:\/\//i.test(url) ? url : 'https://' + url;
  closeLinkDialog();
  const ed = document.getElementById('note-editor');
  ed.focus();
  restoreSelection();
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0 && !sel.isCollapsed) {
    // Text ist markiert → als Link umwandeln
    document.execCommand('createLink', false, fullUrl);
    // Öffnet Links in neuem Tab
    const links = ed.querySelectorAll('a[href="' + fullUrl + '"]');
    links.forEach(a => a.target = '_blank');
  } else {
    // Kein Text markiert → Link mit eigenem Text einfügen
    const a = document.createElement('a');
    a.href   = fullUrl;
    a.target = '_blank';
    a.textContent = text || fullUrl;
    const range = sel && sel.rangeCount > 0 ? sel.getRangeAt(0) : null;
    if (range) { range.deleteContents(); range.insertNode(a); }
    else ed.appendChild(a);
  }
  markDirty();
  showToast('✓ Link eingefügt');
}

function removeLink() {
  closeLinkDialog();
  const ed = document.getElementById('note-editor');
  ed.focus();
  const anchor = getAnchorAtCursor();
  if (anchor) {
    const text = document.createTextNode(anchor.textContent);
    anchor.parentNode.replaceChild(text, anchor);
    markDirty();
    showToast('Link entfernt');
  } else {
    restoreSelection();
    document.execCommand('unlink', false, null);
    markDirty();
  }
}

// ── IMPORT ──
function importJson(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) { showToast('❌ Ungültiges Format'); return; }
      let added = 0, skipped = 0;
      data.forEach(n => {
        if (!n.id || !n.hasOwnProperty('body')) { skipped++; return; }
        const exists = notes.find(x => x.id === n.id);
        if (exists) { skipped++; return; }
        notes.unshift(n);
        added++;
      });
      saveAll(); renderList();
      if (added > 0) openNote(notes[0].id);
      showToast(`✓ ${added} Notiz(en) geladen${skipped ? ', ' + skipped + ' übersprungen' : ''}`);
    } catch(err) {
      showToast('❌ Datei konnte nicht gelesen werden');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function importTextFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const titleRaw = file.name.replace(/\.(txt|md|html?)$/i, '');
    let body = '';
    if (file.name.endsWith('.html')) {
      const tmp = document.createElement('div');
      tmp.innerHTML = text;
      // Versuche, nur den Body-Inhalt zu extrahieren
      const bodyEl = tmp.querySelector('body');
      body = bodyEl ? bodyEl.innerHTML : tmp.innerHTML;
    } else {
      // txt / md: Zeilenumbrüche in <br> umwandeln
      body = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }
    const n = {
      id: Date.now().toString(),
      title: titleRaw,
      body: body,
      color: 0,
      fontFamily: 'Lora, Georgia, serif',
      fontSize: '1rem',
      created: Date.now(),
      updated: Date.now()
    };
    notes.unshift(n);
    saveAll(); renderList(); openNote(n.id);
    showToast('✓ Datei als neue Notiz geladen');
  };
  reader.readAsText(file);
  input.value = '';
}
